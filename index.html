<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DLP Program Dashboard</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232733;
  --border: #2d3141;
  --text: #e1e4ed;
  --text-dim: #8b90a0;
  --accent: #6c8cff;
  --green: #22c55e;
  --yellow: #eab308;
  --orange: #f97316;
  --red: #ef4444;
  --cloud-accent: #38bdf8;
  --onprem-accent: #f59e0b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
header {
  padding: 14px 32px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.site-title { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
.as-of { font-size: 12px; color: var(--text-dim); }

/* Settings button */
.settings-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 14px;
  padding: 4px 8px;
  line-height: 1;
  transition: border-color 0.15s, color 0.15s;
}
.settings-btn:hover { border-color: #4a5080; color: var(--text); }
.settings-btn.active { border-color: var(--accent); color: var(--accent); }

/* Settings panel */
.settings-panel {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
  align-items: flex-end;
}
.settings-panel.hidden { display: none; }
.settings-group { display: flex; flex-direction: column; gap: 8px; }
.settings-group-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
}
.settings-fields { display: flex; flex-wrap: wrap; gap: 12px; }
.settings-field { display: flex; flex-direction: column; gap: 3px; }
.settings-field label { font-size: 10px; color: var(--text-dim); }
.settings-field input[type="number"] {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text);
  font-size: 13px;
  padding: 5px 8px;
  width: 68px;
  outline: none;
  transition: border-color 0.15s;
}
.settings-field input[type="number"]:focus { border-color: var(--accent); }
.settings-divider {
  width: 1px;
  align-self: stretch;
  background: var(--border);
  margin: 0 4px;
}
.settings-apply {
  background: var(--accent);
  border: none;
  border-radius: 6px;
  color: #fff;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  padding: 7px 16px;
  height: fit-content;
  align-self: flex-end;
  transition: opacity 0.15s;
}
.settings-apply:hover { opacity: 0.85; }
.settings-reset {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 12px;
  padding: 6px 12px;
  height: fit-content;
  align-self: flex-end;
  transition: border-color 0.15s;
}
.settings-reset:hover { border-color: #4a5080; color: var(--text); }

main {
  padding: 20px 28px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-width: 1500px;
  margin: 0 auto;
}

/* Section blocks */
.section-block {
  border-radius: 12px;
  border: 1px solid var(--border);
  padding: 14px 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.section-block.cloud {
  border-left: 3px solid var(--cloud-accent);
  background: rgba(56, 189, 248, 0.025);
}
.section-block.onprem {
  border-left: 3px solid var(--onprem-accent);
  background: rgba(245, 158, 11, 0.025);
}

/* Row labels */
.row-label {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 2px;
}
.row-label-text {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  white-space: nowrap;
}
.row-label.cloud .row-label-text { color: var(--cloud-accent); }
.row-label.cloud .row-label-line { background: var(--cloud-accent); opacity: 0.25; }
.row-label.onprem .row-label-text { color: var(--onprem-accent); }
.row-label.onprem .row-label-line { background: var(--onprem-accent); opacity: 0.25; }
.row-label-line {
  flex: 1;
  height: 1px;
}

/* Card row */
.cards-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}

/* Card */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  cursor: pointer;
  transition: border-color 0.2s, box-shadow 0.2s;
  text-decoration: none;
  color: inherit;
}
.card:hover {
  border-color: #4a5080;
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
}
.card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px 0;
}
.card-title { font-size: 10px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
.card-arrow { font-size: 13px; color: var(--text-dim); }
.card-body { padding: 12px 18px 18px; display: flex; flex-direction: column; gap: 12px; }

.loading { color: var(--text-dim); font-size: 12px; padding: 30px 0; text-align: center; }

/* Score ring */
.score-section { display: flex; align-items: center; gap: 14px; }
.ring-wrap { position: relative; flex-shrink: 0; width: 96px; height: 96px; }
.ring-wrap svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
.ring-center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
}
.ring-score { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; line-height: 1; }
.ring-label { font-size: 8px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; }

.score-info { flex: 1; min-width: 0; }
.score-headline { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.1; }
.score-sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; line-height: 1.5; }

.div { border: none; border-top: 1px solid var(--border); }

/* Stats grid */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.stat { background: var(--surface2); border-radius: 7px; padding: 9px 11px; }
.stat-val { font-size: 20px; font-weight: 700; line-height: 1; }
.stat-lbl { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

/* Bars */
.bars { display: flex; flex-direction: column; gap: 7px; }
.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-lbl { font-size: 10px; color: var(--text-dim); width: 68px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; }
.bar-val { font-size: 10px; font-weight: 600; width: 24px; text-align: right; }

.c-green  { color: var(--green); }
.c-yellow { color: var(--yellow); }
.c-orange { color: var(--orange); }
.c-red    { color: var(--red); }

@media (max-width: 960px) {
  .cards-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="site-title">DLP Program Dashboard</div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="as-of" id="hdr-date"></div>
    <button class="settings-btn" id="settings-toggle" title="Configure SLA thresholds">⚙ SLA</button>
  </div>
</header>

<div id="settings-panel" class="settings-panel hidden">
  <div class="settings-group">
    <div class="settings-group-title">Escalation — Penalty Weights</div>
    <div class="settings-fields">
      <div class="settings-field">
        <label>Showstopper</label>
        <input type="number" id="sla-ss-penalty" min="1" max="50" step="1">
      </div>
      <div class="settings-field">
        <label>Critical</label>
        <input type="number" id="sla-crit-penalty" min="0.5" max="20" step="0.5">
      </div>
      <div class="settings-field">
        <label>Major</label>
        <input type="number" id="sla-maj-penalty" min="0.5" max="10" step="0.5">
      </div>
    </div>
  </div>
  <div class="settings-divider"></div>
  <div class="settings-group">
    <div class="settings-group-title">Stalled Items — Thresholds</div>
    <div class="settings-fields">
      <div class="settings-field">
        <label>Stalled (days)</label>
        <input type="number" id="sla-stall-days" min="7" max="180" step="1">
      </div>
      <div class="settings-field">
        <label>Stale warning (days)</label>
        <input type="number" id="sla-stale-warn" min="30" max="365" step="1">
      </div>
      <div class="settings-field">
        <label>Stale critical (days)</label>
        <input type="number" id="sla-stale-crit" min="60" max="730" step="1">
      </div>
    </div>
  </div>
  <div style="margin-left:auto;display:flex;gap:8px;align-items:flex-end">
    <button class="settings-reset" id="settings-reset">Reset</button>
    <button class="settings-apply" id="settings-apply">Apply</button>
  </div>
</div>

<main>
  <!-- Cloud DLP section -->
  <div class="section-block cloud">
    <div class="row-label cloud">
      <div class="row-label-text">&#x2601;&#xFE0F;&nbsp; Cloud DLP</div>
      <div class="row-label-line"></div>
    </div>
    <div class="cards-row">
      <a class="card" href="escalation-dashboard.html">
        <div class="card-top"><div class="card-title">Escalations</div><div class="card-arrow">↗</div></div>
        <div class="card-body" id="cloud-esc-body"><div class="loading">Loading…</div></div>
      </a>
      <a class="card" href="pi-dashboard.html">
        <div class="card-top"><div class="card-title">PI 2026.1 Initiatives</div><div class="card-arrow">↗</div></div>
        <div class="card-body" id="cloud-pi-body"><div class="loading">Loading…</div></div>
      </a>
      <a class="card" href="stalled.html?product=cloud">
        <div class="card-top"><div class="card-title">Stalled Items</div><div class="card-arrow">↗</div></div>
        <div class="card-body" id="cloud-stall-body"><div class="loading">Loading…</div></div>
      </a>
    </div>
  </div>

  <!-- On-Prem DLP section -->
  <div class="section-block onprem">
    <div class="row-label onprem">
      <div class="row-label-text">&#x1F5A5;&#xFE0F;&nbsp; On-Prem DLP</div>
      <div class="row-label-line"></div>
    </div>
    <div class="cards-row">
      <a class="card" href="escalation-dashboard.html">
        <div class="card-top"><div class="card-title">Escalations</div><div class="card-arrow">↗</div></div>
        <div class="card-body" id="onprem-esc-body"><div class="loading">Loading…</div></div>
      </a>
      <a class="card" href="pi-dashboard.html">
        <div class="card-top"><div class="card-title">PI 2026.1 Initiatives</div><div class="card-arrow">↗</div></div>
        <div class="card-body" id="onprem-pi-body"><div class="loading">Loading…</div></div>
      </a>
      <a class="card" href="stalled.html?product=onprem">
        <div class="card-top"><div class="card-title">Stalled Items</div><div class="card-arrow">↗</div></div>
        <div class="card-body" id="onprem-stall-body"><div class="loading">Loading…</div></div>
      </a>
    </div>
  </div>
</main>

<script>
// ─── SLA Config ───────────────────────────────────────────────────────────────

const SLA_KEY = 'dlp-sla-v1';
const SLA_DEFAULTS = {
  ssPenalty:  10,
  critPenalty: 4,
  majPenalty:  1.5,
  stallDays:  30,
  staleWarn:  90,
  staleCrit: 180
};

function loadSLA() {
  try { return Object.assign({}, SLA_DEFAULTS, JSON.parse(localStorage.getItem(SLA_KEY) || '{}')); }
  catch { return Object.assign({}, SLA_DEFAULTS); }
}

function saveSLA(sla) {
  localStorage.setItem(SLA_KEY, JSON.stringify(sla));
}

let SLA = loadSLA();

// ─── Settings panel ───────────────────────────────────────────────────────────

function populateInputs(sla) {
  document.getElementById('sla-ss-penalty').value   = sla.ssPenalty;
  document.getElementById('sla-crit-penalty').value = sla.critPenalty;
  document.getElementById('sla-maj-penalty').value  = sla.majPenalty;
  document.getElementById('sla-stall-days').value   = sla.stallDays;
  document.getElementById('sla-stale-warn').value   = sla.staleWarn;
  document.getElementById('sla-stale-crit').value   = sla.staleCrit;
}

populateInputs(SLA);

document.getElementById('settings-toggle').addEventListener('click', function() {
  const panel = document.getElementById('settings-panel');
  const btn   = this;
  const hidden = panel.classList.toggle('hidden');
  btn.classList.toggle('active', !hidden);
  if (!hidden) populateInputs(SLA);
});

document.getElementById('settings-apply').addEventListener('click', function() {
  SLA = {
    ssPenalty:   parseFloat(document.getElementById('sla-ss-penalty').value)   || SLA_DEFAULTS.ssPenalty,
    critPenalty: parseFloat(document.getElementById('sla-crit-penalty').value) || SLA_DEFAULTS.critPenalty,
    majPenalty:  parseFloat(document.getElementById('sla-maj-penalty').value)  || SLA_DEFAULTS.majPenalty,
    stallDays:   parseInt(document.getElementById('sla-stall-days').value)     || SLA_DEFAULTS.stallDays,
    staleWarn:   parseInt(document.getElementById('sla-stale-warn').value)     || SLA_DEFAULTS.staleWarn,
    staleCrit:   parseInt(document.getElementById('sla-stale-crit').value)     || SLA_DEFAULTS.staleCrit,
  };
  saveSLA(SLA);
  document.getElementById('settings-panel').classList.add('hidden');
  document.getElementById('settings-toggle').classList.remove('active');
  refresh();
});

document.getElementById('settings-reset').addEventListener('click', function() {
  SLA = Object.assign({}, SLA_DEFAULTS);
  saveSLA(SLA);
  populateInputs(SLA);
  document.getElementById('settings-panel').classList.add('hidden');
  document.getElementById('settings-toggle').classList.remove('active');
  refresh();
});

// ─── Utilities ────────────────────────────────────────────────────────────────

function scoreColor(s) {
  if (s >= 75) return 'var(--green)';
  if (s >= 50) return 'var(--yellow)';
  if (s >= 30) return 'var(--orange)';
  return 'var(--red)';
}
function scoreClass(s) {
  if (s >= 75) return 'c-green';
  if (s >= 50) return 'c-yellow';
  if (s >= 30) return 'c-orange';
  return 'c-red';
}

function ring(score, label) {
  const R = 40, SW = 9, SZ = 96;
  const circ = 2 * Math.PI * R;
  const fill = (Math.max(0, Math.min(100, score)) / 100) * circ;
  const col  = scoreColor(score);
  return `
    <div class="ring-wrap">
      <svg width="${SZ}" height="${SZ}" viewBox="0 0 ${SZ} ${SZ}">
        <circle cx="48" cy="48" r="${R}" fill="none" stroke="var(--surface2)" stroke-width="${SW}"/>
        <circle cx="48" cy="48" r="${R}" fill="none" stroke="${col}" stroke-width="${SW}"
          stroke-dasharray="${fill.toFixed(1)} ${circ.toFixed(1)}" stroke-linecap="round"/>
      </svg>
      <div class="ring-center">
        <div class="ring-score" style="color:${col}">${Math.round(score)}%</div>
        <div class="ring-label">${label}</div>
      </div>
    </div>`;
}

function stat(val, label, cls) {
  return `<div class="stat"><div class="stat-val${cls ? ' ' + cls : ''}">${val}</div><div class="stat-lbl">${label}</div></div>`;
}

function bar(label, pct, col) {
  const p = Math.min(100, Math.max(0, pct));
  return `<div class="bar-row">
    <div class="bar-lbl">${label}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${p.toFixed(1)}%;background:${col}"></div></div>
    <div class="bar-val" style="color:${col}">${Math.round(p)}</div>
  </div>`;
}

function isOpen(s) {
  return !['closed','resolved','done','fixed'].includes((s||'').toLowerCase());
}

// ─── Escalation ───────────────────────────────────────────────────────────────

let _escData = null;

async function loadEscalation() {
  if (!_escData) {
    const html = await fetch('escalation-dashboard.html').then(r => r.text());
    const cloudRaw  = html.match(/const cloudData = (\[[\s\S]*?\n\]);/);
    const onpremRaw = html.match(/const onpremData = (\[[\s\S]*?\n\]);/);
    if (!cloudRaw || !onpremRaw) return;
    // eslint-disable-next-line no-new-func
    _escData = {
      cloud:  new Function('return ' + cloudRaw[1])(),
      onprem: new Function('return ' + onpremRaw[1])(),
    };
    const dateM = html.match(/Data as of: (\d{4}-\d{2}-\d{2})/);
    if (dateM) document.getElementById('hdr-date').textContent = 'Data as of ' + dateM[1];
  }

  function analyze(data) {
    const open  = data.filter(t => isOpen(t.status));
    const ss    = open.filter(t => t.priority === 'Showstopper').length;
    const crit  = open.filter(t => t.priority === 'Critical').length;
    const maj   = open.filter(t => t.priority === 'Major').length;
    const penalty   = ss * SLA.ssPenalty + crit * SLA.critPenalty + maj * SLA.majPenalty;
    const closed    = data.length - open.length;
    const closurePct = Math.round(closed / Math.max(1, data.length) * 100);
    return { score: Math.max(0, 100 - penalty), open: open.length, total: data.length, closed, closurePct, ss, crit, maj };
  }

  renderEscCard('cloud-esc-body',  analyze(_escData.cloud));
  renderEscCard('onprem-esc-body', analyze(_escData.onprem));
}

function renderEscCard(bodyId, d) {
  document.getElementById(bodyId).innerHTML = `
    <div class="score-section">
      ${ring(d.score, 'Health')}
      <div class="score-info">
        <div class="score-headline ${scoreClass(d.score)}">${d.open} Open</div>
        <div class="score-sub">${d.closed} resolved &middot; ${d.total} total<br>Last 90 days</div>
      </div>
    </div>
    <hr class="div">
    <div class="stat-grid">
      ${stat(d.ss,   'Showstoppers', d.ss > 0   ? 'c-red'    : 'c-green')}
      ${stat(d.crit, 'Criticals',   d.crit > 5  ? 'c-red'    : d.crit > 0 ? 'c-orange' : 'c-green')}
      ${stat(d.open, 'Open',        d.open > 5  ? 'c-orange' : 'c-yellow')}
      ${stat(d.closed,'Resolved',   'c-green')}
    </div>`;
}

// ─── PI Initiatives ───────────────────────────────────────────────────────────

async function loadPI() {
  const html = await fetch('pi-dashboard.html').then(r => r.text());

  function countBadgeClass(section, cls) {
    return [...section.matchAll(/class="status-badge (status-[^"]+)"/g)]
      .filter(m => m[1] === cls).length;
  }

  const cloudSection  = html.slice(html.indexOf('id="tab-cloud"'),   html.indexOf('id="tab-onprem"'));
  const onpremSection = html.slice(html.indexOf('id="tab-onprem"'));

  function analyzePI(section) {
    const done     = countBadgeClass(section, 'status-done');
    const review   = countBadgeClass(section, 'status-review');
    const progress = countBadgeClass(section, 'status-progress');
    const todo     = countBadgeClass(section, 'status-todo');
    const blocked  = countBadgeClass(section, 'status-blocked');
    const deferred = countBadgeClass(section, 'status-deferred');
    const total    = done + review + progress + todo + blocked + deferred;
    const active   = Math.max(1, total - deferred - blocked);
    const inFlight = review + progress;
    const effective = done * 100 + review * 75 + progress * 40;
    const score    = Math.min(100, Math.round(effective / active));
    const pctDone  = Math.round(done / active * 100);
    const pctFlight = Math.round(inFlight / active * 100);
    return { done, review, progress, todo, blocked, deferred, total, active, inFlight, score, pctDone, pctFlight };
  }

  renderPICard('cloud-pi-body',  analyzePI(cloudSection));
  renderPICard('onprem-pi-body', analyzePI(onpremSection));
}

function renderPICard(bodyId, d) {
  const defBlocked = d.deferred + d.blocked;
  document.getElementById(bodyId).innerHTML = `
    <div class="score-section">
      ${ring(d.score, 'Progress')}
      <div class="score-info">
        <div class="score-headline ${scoreClass(d.score)}">${d.done} Done</div>
        <div class="score-sub">${d.pctDone}% complete &middot; ${d.total} total<br>PI 2026.1</div>
      </div>
    </div>
    <hr class="div">
    <div class="stat-grid">
      ${stat(d.done,      'Done',          'c-green')}
      ${stat(d.inFlight,  'In Flight',     'c-yellow')}
      ${stat(d.todo,      'Not Started',   d.todo > 5 ? 'c-orange' : '')}
      ${stat(defBlocked,  'Def/Blocked',   defBlocked > 2 ? 'c-red' : 'c-orange')}
    </div>`;
}

// ─── Stalled Items ────────────────────────────────────────────────────────────

const CLOUD_PROJS = new Set(['NEO', 'DPS']);

let _stalledAll = null;

async function loadStalled() {
  if (!_stalledAll) {
    const html  = await fetch('stalled.html').then(r => r.text());
    const match = html.match(/const ISSUES = (\[[\s\S]*?\]);/);
    if (!match) return;
    _stalledAll = JSON.parse(match[1]);
  }

  const cloud  = _stalledAll.filter(i => CLOUD_PROJS.has(i.project));
  const onprem = _stalledAll.filter(i => !CLOUD_PROJS.has(i.project));

  renderStalledCard('cloud-stall-body',  cloud);
  renderStalledCard('onprem-stall-body', onprem);
}

function renderStalledCard(bodyId, issues) {
  const today    = new Date('2026-03-30');
  const ageD     = d => (today - new Date(d)) / 86400000;
  const total    = issues.length;
  const ss       = issues.filter(i => i.priority === 'Showstopper').length;
  const crit     = issues.filter(i => i.priority === 'Critical').length;
  const maj      = issues.filter(i => i.priority === 'Major').length;
  const staleWarn = issues.filter(i => ageD(i.updated) >= SLA.staleWarn).length;
  const staleCrit = issues.filter(i => ageD(i.updated) >= SLA.staleCrit).length;
  const penalty   = ss * 8 + crit * 2 + staleWarn * 3;
  const score     = Math.max(0, 100 - penalty);

  // Team breakdown
  const byTeam = {};
  issues.forEach(i => { byTeam[i.team] = (byTeam[i.team] || 0) + 1; });
  const teams = Object.entries(byTeam).sort((a, b) => b[1] - a[1]);
  const teamBars = total > 0 ? teams.slice(0, 3).map(([name, count]) => {
    const pct = count / total * 100;
    const parts = name.split(' ');
    const label = parts.length >= 2 && parts[parts.length - 1].toLowerCase() === 'direct'
      ? parts[0] : parts[parts.length - 1];
    return bar(label, pct, 'var(--orange)');
  }).join('') : '';

  document.getElementById(bodyId).innerHTML = `
    <div class="score-section">
      ${ring(score, 'Health')}
      <div class="score-info">
        <div class="score-headline ${scoreClass(score)}">${total} Stalled</div>
        <div class="score-sub">${ss + crit} critical &middot; ${staleWarn} stale ${SLA.staleWarn}d+<br>No update in ${SLA.stallDays}+ days</div>
      </div>
    </div>
    <hr class="div">
    <div class="stat-grid">
      ${stat(ss + crit, 'Critical+',  ss + crit > 10 ? 'c-red'    : ss + crit > 0 ? 'c-orange' : 'c-green')}
      ${stat(staleWarn, `Stale ${SLA.staleWarn}d+`, staleWarn > 3  ? 'c-orange' : staleWarn > 0   ? 'c-yellow' : 'c-green')}
      ${stat(maj,       'Major',      '')}
      ${stat(staleCrit, `Stale ${SLA.staleCrit}d+`, staleCrit > 0  ? 'c-red'    : 'c-green')}
    </div>
    ${teamBars ? `<div class="bars">${teamBars}</div>` : ''}`;
}

// ─── Boot & Refresh ───────────────────────────────────────────────────────────

function refresh() {
  Promise.all([
    loadEscalation().catch(e => { console.error(e); ['cloud-esc-body','onprem-esc-body'].forEach(id => { document.getElementById(id).innerHTML = '<div class="loading">Failed to load</div>'; }); }),
    loadPI().catch(e => { console.error(e); ['cloud-pi-body','onprem-pi-body'].forEach(id => { document.getElementById(id).innerHTML = '<div class="loading">Failed to load</div>'; }); }),
    loadStalled().catch(e => { console.error(e); ['cloud-stall-body','onprem-stall-body'].forEach(id => { document.getElementById(id).innerHTML = '<div class="loading">Failed to load</div>'; }); }),
  ]);
}

refresh();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DLP Dashboards</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232733;
    --border: #2d3141;
    --text: #e1e4ed;
    --text-dim: #8b90a0;
    --accent: #6c8cff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .top-nav {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .site-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    padding: 14px 24px 14px 0;
    margin-right: 8px;
    border-right: 1px solid var(--border);
    letter-spacing: -0.3px;
    white-space: nowrap;
  }
  .top-tab {
    padding: 14px 24px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .top-tab:hover { color: var(--text); }
  .top-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .frame-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .frame-container iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: none;
    visibility: hidden;
    pointer-events: none;
  }
  .frame-container iframe.active {
    visibility: visible;
    pointer-events: auto;
  }
</style>
</head>
<body>

<nav class="top-nav">
  <div class="site-title">DLP Dashboards</div>
  <div class="top-tab active" onclick="switchProject('stalled', this)">Stalled Items</div>
  <div class="top-tab" onclick="switchProject('pi', this)">PI 2026.1 Completion</div>
</nav>

<div class="frame-container">
  <iframe id="frame-stalled" class="active" src="stalled.html"></iframe>
  <iframe id="frame-pi" src="pi-dashboard.html"></iframe>
</div>

<script>
function switchProject(project, el) {
  document.querySelectorAll('.top-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.frame-container iframe').forEach(f => f.classList.remove('active'));
  if (el) el.classList.add('active');
  else {
    const idx = project === 'pi' ? 1 : 0;
    document.querySelectorAll('.top-tab')[idx].classList.add('active');
  }
  document.getElementById('frame-' + project).classList.add('active');
  window.location.hash = project === 'stalled' ? '' : project;
}

// Support URL hash navigation
if (window.location.hash === '#pi') {
  switchProject('pi');
}
</script>
</body>
</html>

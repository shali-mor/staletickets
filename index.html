<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>On-Prem Scrum Teams — Stalled Items Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232733;
    --border: #2d3141;
    --text: #e1e4ed;
    --text-dim: #8b90a0;
    --accent: #6c8cff;
    --red: #ff6b6b;
    --orange: #ffa64d;
    --yellow: #ffd93d;
    --green: #51cf66;
    --purple: #b197fc;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    min-height: 100vh;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .header h1 span { color: var(--text-dim); font-weight: 400; }
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .controls label {
    font-size: 13px;
    color: var(--text-dim);
  }
  .controls input[type=range] {
    width: 140px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .threshold-val {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    min-width: 56px;
  }
  .controls select {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
  }

  /* Summary cards */
  .summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }
  .stat-card .num {
    font-size: 32px;
    font-weight: 700;
    line-height: 1.1;
  }
  .stat-card .label {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Team sections */
  .team-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .team-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .team-header:hover { background: var(--surface2); }
  .team-header h2 {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .team-header .arrow {
    font-size: 12px;
    transition: transform 0.2s;
    color: var(--text-dim);
  }
  .team-header.collapsed .arrow { transform: rotate(-90deg); }
  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 24px;
    height: 24px;
    padding: 0 8px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 700;
  }
  .badge-red { background: rgba(255,107,107,0.15); color: var(--red); }
  .badge-orange { background: rgba(255,166,77,0.15); color: var(--orange); }
  .badge-yellow { background: rgba(255,217,61,0.15); color: var(--yellow); }
  .badge-green { background: rgba(81,207,102,0.15); color: var(--green); }
  .team-stats {
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .team-stats .mini-stat {
    font-size: 12px;
    color: var(--text-dim);
  }
  .team-stats .mini-stat strong { color: var(--text); }

  /* Issue table */
  .team-body { display: block; }
  .team-body.hidden { display: none; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    background: var(--surface2);
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    white-space: nowrap;
    position: relative;
  }
  thead th:hover { color: var(--text); }
  thead th .sort-arrow { margin-left: 4px; font-size: 10px; }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:hover { background: rgba(108,140,255,0.04); }
  tbody tr:last-child { border-bottom: none; }
  td {
    padding: 10px 14px;
    vertical-align: middle;
  }
  td a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }
  td a:hover { text-decoration: underline; }
  .summary-cell {
    max-width: 360px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .days-cell {
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .severity-critical { color: var(--red); }
  .severity-high { color: var(--orange); }
  .severity-medium { color: var(--yellow); }
  .severity-low { color: var(--green); }

  .status-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .status-inprogress { background: rgba(108,140,255,0.15); color: var(--accent); }
  .status-review { background: rgba(177,151,252,0.15); color: var(--purple); }
  .status-other { background: rgba(139,144,160,0.15); color: var(--text-dim); }

  .priority-pill {
    font-size: 11px;
    font-weight: 600;
  }
  .pri-showstopper, .pri-critical { color: var(--red); }
  .pri-major { color: var(--orange); }
  .pri-minor { color: var(--yellow); }
  .pri-trivial { color: var(--text-dim); }

  .empty-state {
    padding: 40px;
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
  }

  /* Bar chart */
  .chart-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  @media (max-width: 900px) { .chart-row { grid-template-columns: 1fr; } }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .chart-card h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--text-dim);
  }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .bar-label {
    font-size: 12px;
    min-width: 110px;
    text-align: right;
    color: var(--text-dim);
  }
  .bar-track {
    flex: 1;
    height: 22px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
    display: flex;
    align-items: center;
    padding-left: 8px;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    min-width: 28px;
  }
  .bar-red { background: var(--red); }
  .bar-orange { background: var(--orange); }
  .bar-yellow { background: var(--yellow); }
  .bar-green { background: var(--green); }
  .bar-accent { background: var(--accent); }

  .timestamp {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 16px;
    padding-bottom: 8px;
  }

  /* Assignee heatmap */
  .heatmap-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
  }
  .heatmap-cell {
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px 12px;
    text-align: center;
  }
  .heatmap-cell .name { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
  .heatmap-cell .count { font-size: 20px; font-weight: 700; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>On-Prem Stalled Items <span>/ Scrum Teams Dashboard</span></h1>
    <p style="font-size:13px;color:var(--text-dim);margin-top:4px;">In-progress items exceeding the staleness threshold across DLP, DSA, DPS, CASB</p>
  </div>
  <div class="controls">
    <label>Stale threshold:</label>
    <input type="range" id="thresholdSlider" min="3" max="90" value="14">
    <span class="threshold-val" id="thresholdLabel">14 days</span>
    <select id="projectFilter">
      <option value="all">All Projects</option>
      <option value="DLP">DLP</option>
      <option value="DSA">DSA</option>
      <option value="DPS">DPS</option>
      <option value="CASB">CASB</option>
    </select>
    <select id="priorityFilter">
      <option value="all">All Priorities</option>
      <option value="Showstopper">Showstopper</option>
      <option value="Critical">Critical</option>
      <option value="Major">Major</option>
      <option value="Minor">Minor</option>
    </select>
  </div>
</div>

<div class="summary" id="summaryCards"></div>
<div class="chart-row" id="charts"></div>
<div id="teamSections"></div>
<div class="timestamp" id="timestamp"></div>

const TEAMS = ['Saar Srur', 'Itzhak Hasson', 'Yoav Epelman', 'Ron Direct'];
const TEAM_COLORS = {
  'Saar Srur': '#6c8cff',
  'Itzhak Hasson': '#b197fc',
  'Yoav Epelman': '#51cf66',
  'Ron Direct': '#ffa64d'
};

const TODAY = new Date('2026-03-15');

function daysSince(dateStr) {
  const d = new Date(dateStr);
  return Math.floor((TODAY - d) / (1000 * 60 * 60 * 24));
}

function staleDays(issue) {
  return daysSince(issue.updated);
}

function severityClass(days, threshold) {
  if (days >= threshold * 3) return 'severity-critical';
  if (days >= threshold * 2) return 'severity-high';
  if (days >= threshold) return 'severity-medium';
  return 'severity-low';
}

function statusClass(status) {
  const s = status.toLowerCase();
  if (s.includes('progress') || s.includes('hold')) return 'status-inprogress';
  if (s.includes('review') || s.includes('test')) return 'status-review';
  return 'status-other';
}

function priorityClass(pri) {
  return 'pri-' + (pri || 'minor').toLowerCase().replace(/\s/g, '');
}

function getFiltered() {
  const threshold = parseInt(document.getElementById('thresholdSlider').value);
  const projFilter = document.getElementById('projectFilter').value;
  const priFilter = document.getElementById('priorityFilter').value;

  return ISSUES.filter(i => {
    if (staleDays(i) < threshold) return false;
    if (projFilter !== 'all' && i.project !== projFilter) return false;
    if (priFilter !== 'all' && i.priority !== priFilter) return false;
    return true;
  });
}

function render() {
  const threshold = parseInt(document.getElementById('thresholdSlider').value);
  document.getElementById('thresholdLabel').textContent = threshold + ' days';

  const filtered = getFiltered();

  // Summary cards
  const totalStalled = filtered.length;
  const maxDays = filtered.length ? Math.max(...filtered.map(i => staleDays(i))) : 0;
  const avgDays = filtered.length ? Math.round(filtered.reduce((s, i) => s + staleDays(i), 0) / filtered.length) : 0;
  const criticalCount = filtered.filter(i => staleDays(i) >= threshold * 3).length;
  const teamsAffected = new Set(filtered.map(i => i.team)).size;

  document.getElementById('summaryCards').innerHTML = `
    <div class="stat-card">
      <div class="num" style="color:var(--red)">${totalStalled}</div>
      <div class="label">Stalled Items</div>
    </div>
    <div class="stat-card">
      <div class="num" style="color:var(--orange)">${criticalCount}</div>
      <div class="label">Critical (3x threshold)</div>
    </div>
    <div class="stat-card">
      <div class="num" style="color:var(--yellow)">${avgDays}d</div>
      <div class="label">Avg Days Stale</div>
    </div>
    <div class="stat-card">
      <div class="num" style="color:var(--accent)">${maxDays}d</div>
      <div class="label">Longest Stale</div>
    </div>
    <div class="stat-card">
      <div class="num" style="color:var(--purple)">${teamsAffected}/${TEAMS.length}</div>
      <div class="label">Teams Affected</div>
    </div>
  `;

  // Charts
  const maxBarItems = Math.max(...TEAMS.map(t => filtered.filter(i => i.team === t).length), 1);
  const teamBars = TEAMS.map(t => {
    const count = filtered.filter(i => i.team === t).length;
    const pct = Math.round(count / Math.max(maxBarItems, 1) * 100);
    const color = count >= 10 ? 'bar-red' : count >= 5 ? 'bar-orange' : count >= 1 ? 'bar-yellow' : 'bar-green';
    return `<div class="bar-row">
      <div class="bar-label">${t}</div>
      <div class="bar-track"><div class="bar-fill ${color}" style="width:${Math.max(pct, 8)}%">${count}</div></div>
    </div>`;
  }).join('');

  // Assignee heatmap
  const assigneeCounts = {};
  filtered.forEach(i => {
    assigneeCounts[i.assignee] = (assigneeCounts[i.assignee] || 0) + 1;
  });
  const sortedAssignees = Object.entries(assigneeCounts).sort((a, b) => b[1] - a[1]);
  const maxAssigneeCount = sortedAssignees.length ? sortedAssignees[0][1] : 1;
  const heatCells = sortedAssignees.map(([name, count]) => {
    const ratio = count / maxAssigneeCount;
    const color = ratio >= 0.75 ? 'var(--red)' : ratio >= 0.5 ? 'var(--orange)' : ratio >= 0.25 ? 'var(--yellow)' : 'var(--green)';
    return `<div class="heatmap-cell">
      <div class="name">${name.split(',').reverse().join(' ').trim()}</div>
      <div class="count" style="color:${color}">${count}</div>
    </div>`;
  }).join('');

  document.getElementById('charts').innerHTML = `
    <div class="chart-card">
      <h3>STALLED ITEMS BY TEAM</h3>
      ${teamBars}
    </div>
    <div class="chart-card">
      <h3>STALLED ITEMS BY ASSIGNEE</h3>
      <div class="heatmap-grid">${heatCells || '<div style="color:var(--text-dim)">No stalled items</div>'}</div>
    </div>
  `;

  // Team sections
  let sectionsHtml = '';
  for (const team of TEAMS) {
    const teamIssues = filtered.filter(i => i.team === team)
      .sort((a, b) => staleDays(b) - staleDays(a));

    const stalledCount = teamIssues.length;
    const critCount = teamIssues.filter(i => staleDays(i) >= threshold * 3).length;
    const highCount = teamIssues.filter(i => {
      const d = staleDays(i);
      return d >= threshold * 2 && d < threshold * 3;
    }).length;
    const badgeClass = critCount > 0 ? 'badge-red' : highCount > 0 ? 'badge-orange' : stalledCount > 0 ? 'badge-yellow' : 'badge-green';
    const teamColor = TEAM_COLORS[team];

    let rows = '';
    for (const iss of teamIssues) {
      const days = staleDays(iss);
      const sevClass = severityClass(days, threshold);
      const stClass = statusClass(iss.status);
      const priClass = priorityClass(iss.priority);
      const createdDays = daysSince(iss.created);
      rows += `<tr>
        <td><a href="${iss.url}" target="_blank">${iss.key}</a></td>
        <td class="summary-cell" title="${iss.summary.replace(/"/g, '&quot;')}">${iss.summary}</td>
        <td>${iss.assignee.split(',').reverse().join(' ').trim()}</td>
        <td><span class="status-pill ${stClass}">${iss.status}</span></td>
        <td><span class="priority-pill ${priClass}">${iss.priority}</span></td>
        <td>${iss.project}</td>
        <td class="days-cell ${sevClass}">${days}d</td>
        <td style="color:var(--text-dim)">${createdDays}d</td>
      </tr>`;
    }

    const tableHtml = teamIssues.length === 0
      ? '<div class="empty-state">No stalled items for this team at current threshold</div>'
      : `<table>
          <thead><tr>
            <th>Key</th><th>Summary</th><th>Assignee</th><th>Status</th><th>Priority</th><th>Project</th>
            <th>Days Stale</th><th>Age</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>`;

    sectionsHtml += `
      <div class="team-section">
        <div class="team-header" onclick="toggleTeam(this)" style="border-left:4px solid ${teamColor}">
          <h2>
            <span class="arrow">&#9660;</span>
            ${team}
            <span class="badge ${badgeClass}">${stalledCount}</span>
          </h2>
          <div class="team-stats">
            ${critCount ? `<span class="mini-stat" style="color:var(--red)"><strong>${critCount}</strong> critical</span>` : ''}
            ${highCount ? `<span class="mini-stat" style="color:var(--orange)"><strong>${highCount}</strong> high</span>` : ''}
            <span class="mini-stat"><strong>${stalledCount}</strong> total stalled</span>
          </div>
        </div>
        <div class="team-body">${tableHtml}</div>
      </div>
    `;
  }

  document.getElementById('teamSections').innerHTML = sectionsHtml;
  document.getElementById('timestamp').textContent = 'Data as of ' + TODAY.toISOString().slice(0, 10) + ' | Threshold: items not updated in ' + threshold + '+ days';
}

function toggleTeam(header) {
  header.classList.toggle('collapsed');
  const body = header.nextElementSibling;
  body.classList.toggle('hidden');
}

document.getElementById('thresholdSlider').addEventListener('input', render);
document.getElementById('projectFilter').addEventListener('change', render);
document.getElementById('priorityFilter').addEventListener('change', render);

render();
</script>
